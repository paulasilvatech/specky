<!-- Specky v3.0 — Full Logo (Dark Background)
     For dark hero sections, dark README themes, terminal docs
     Canvas: 480×100
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 100" width="480" height="100"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <defs>
    <linearGradient id="iconGradDk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glowDk">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- ============= ICON ============= -->
  <g transform="translate(10, 10)">
    <circle cx="40" cy="40" r="40" fill="url(#iconGradDk)"/>

    <!-- Connections -->
    <path d="M54,20 C54,32 40,28 40,40" stroke="#e9d5ff" stroke-width="2" fill="none" opacity="0.45"/>
    <path d="M40,40 C40,52 26,48 26,60" stroke="#e9d5ff" stroke-width="2" fill="none" opacity="0.45"/>
    <path d="M54,20 C62,26 62,32 56,38" stroke="#c4b5fd" stroke-width="1.2" fill="none" opacity="0.25" stroke-dasharray="3 2"/>
    <path d="M26,60 C18,54 18,48 24,42" stroke="#c4b5fd" stroke-width="1.2" fill="none" opacity="0.25" stroke-dasharray="3 2"/>
    <path d="M56,38 L44,40" stroke="#c4b5fd" stroke-width="1" fill="none" opacity="0.2" stroke-dasharray="2 2"/>
    <path d="M24,42 L36,40" stroke="#c4b5fd" stroke-width="1" fill="none" opacity="0.2" stroke-dasharray="2 2"/>

    <!-- Nodes -->
    <circle cx="54" cy="20" r="5" fill="none" stroke="#e9d5ff" stroke-width="1.5" opacity="0.4"/>
    <circle cx="54" cy="20" r="3" fill="white" opacity="0.85" filter="url(#glowDk)"/>

    <circle cx="40" cy="40" r="10" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>
    <circle cx="40" cy="40" r="7" fill="white" opacity="0.15"/>
    <circle cx="40" cy="40" r="5" fill="white" filter="url(#glowDk)"/>
    <path d="M37,36 C37,36 43,36 43,40 C43,44 37,44 37,44" stroke="#7c3aed" stroke-width="1.8" stroke-linecap="round" fill="none"/>

    <circle cx="26" cy="60" r="5" fill="none" stroke="#e9d5ff" stroke-width="1.5" opacity="0.4"/>
    <circle cx="26" cy="60" r="3" fill="white" opacity="0.85" filter="url(#glowDk)"/>

    <!-- Satellites -->
    <circle cx="56" cy="38" r="2" fill="#e9d5ff" opacity="0.5"/>
    <circle cx="24" cy="42" r="2" fill="#e9d5ff" opacity="0.5"/>
    <circle cx="40" cy="20" r="1.5" fill="#c4b5fd" opacity="0.35"/>
    <circle cx="40" cy="60" r="1.5" fill="#c4b5fd" opacity="0.35"/>
    <circle cx="62" cy="30" r="1.2" fill="#e9d5ff" opacity="0.3"/>
    <circle cx="18" cy="50" r="1.2" fill="#e9d5ff" opacity="0.3"/>

    <!-- Pulses -->
    <circle cx="47" cy="29" r="1.5" fill="white" opacity="0.8"/>
    <circle cx="33" cy="51" r="1.5" fill="white" opacity="0.8"/>
  </g>

  <!-- ============= WORDMARK (white) ============= -->
  <text x="106" y="58" font-size="42" font-weight="700" fill="#f5f3ff" letter-spacing="-0.5">specky</text>

  <text x="106" y="78" font-size="11" font-weight="600" fill="#a78bfa" letter-spacing="1.8" opacity="0.55">AGENTIC SPEC-DRIVEN DEVELOPMENT</text>

</svg>
