<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#2C2C2A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0078D4"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7FBA00"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FFB900"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F25022"/>
    </marker>
    <linearGradient id="accent-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0078D4"/>
      <stop offset="33%" stop-color="#7FBA00"/>
      <stop offset="66%" stop-color="#FFB900"/>
      <stop offset="100%" stop-color="#F25022"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1400" height="600" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="700" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#2C2C2A">Specky Pipeline — 10 Mandatory Phases</text>
  <text x="700" y="64" text-anchor="middle" font-size="13" fill="#5F5E5A">State machine enforcement  ·  Every phase produces artifacts and diagrams</text>

  <!-- 4-color accent bar -->
  <rect x="460" y="74" width="480" height="3" rx="1.5" fill="url(#accent-bar)"/>

  <!-- ============================================================ -->
  <!-- ROW 1: Phases 1-5   y-center = 180 -->
  <!-- ============================================================ -->

  <!-- Phase 1: Init (Blue) -->
  <g filter="url(#shadow)">
    <rect x="60" y="120" width="200" height="100" rx="8" fill="#FFFFFF" stroke="#0078D4" stroke-width="2"/>
    <rect x="60" y="120" width="200" height="6" rx="3" fill="#0078D4"/>
  </g>
  <text x="76" y="148" font-size="11" fill="#888780">Phase 1</text>
  <text x="160" y="172" text-anchor="middle" font-size="16" font-weight="700" fill="#2C2C2A">Init</text>
  <text x="160" y="192" text-anchor="middle" font-size="11" fill="#5F5E5A">CONSTITUTION.md</text>

  <!-- Phase 2: Discover (Blue) -->
  <g filter="url(#shadow)">
    <rect x="310" y="120" width="200" height="100" rx="8" fill="#FFFFFF" stroke="#0078D4" stroke-width="2"/>
    <rect x="310" y="120" width="200" height="6" rx="3" fill="#0078D4"/>
  </g>
  <text x="326" y="148" font-size="11" fill="#888780">Phase 2</text>
  <text x="410" y="172" text-anchor="middle" font-size="16" font-weight="700" fill="#2C2C2A">Discover</text>
  <text x="410" y="192" text-anchor="middle" font-size="11" fill="#5F5E5A">Codebase Scan</text>

  <!-- Phase 3: Specify (Green) -->
  <g filter="url(#shadow)">
    <rect x="560" y="120" width="200" height="100" rx="8" fill="#FFFFFF" stroke="#7FBA00" stroke-width="2"/>
    <rect x="560" y="120" width="200" height="6" rx="3" fill="#7FBA00"/>
  </g>
  <text x="576" y="148" font-size="11" fill="#888780">Phase 3</text>
  <text x="660" y="172" text-anchor="middle" font-size="16" font-weight="700" fill="#2C2C2A">Specify</text>
  <text x="660" y="192" text-anchor="middle" font-size="11" fill="#5F5E5A">SPECIFICATION.md</text>

  <!-- Phase 4: Clarify (Green) -->
  <g filter="url(#shadow)">
    <rect x="810" y="120" width="200" height="100" rx="8" fill="#FFFFFF" stroke="#7FBA00" stroke-width="2"/>
    <rect x="810" y="120" width="200" height="6" rx="3" fill="#7FBA00"/>
  </g>
  <text x="826" y="148" font-size="11" fill="#888780">Phase 4</text>
  <text x="910" y="172" text-anchor="middle" font-size="16" font-weight="700" fill="#2C2C2A">Clarify</text>
  <text x="910" y="192" text-anchor="middle" font-size="11" fill="#5F5E5A">EARS Validation</text>

  <!-- Phase 5: Design (Yellow) -->
  <g filter="url(#shadow)">
    <rect x="1060" y="120" width="200" height="100" rx="8" fill="#FFFFFF" stroke="#FFB900" stroke-width="2"/>
    <rect x="1060" y="120" width="200" height="6" rx="3" fill="#FFB900"/>
  </g>
  <text x="1076" y="148" font-size="11" fill="#888780">Phase 5</text>
  <text x="1160" y="172" text-anchor="middle" font-size="16" font-weight="700" fill="#2C2C2A">Design</text>
  <text x="1160" y="192" text-anchor="middle" font-size="11" fill="#5F5E5A">DESIGN.md</text>

  <!-- ============================================================ -->
  <!-- ROW 1 ARROWS (horizontal) -->
  <!-- ============================================================ -->

  <!-- 1 -> 2 -->
  <path d="M260,170 L300,170 Q310,170 310,170" fill="none" stroke="#0078D4" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <!-- 2 -> 3 -->
  <path d="M510,170 L550,170 Q560,170 560,170" fill="none" stroke="#0078D4" stroke-width="2" marker-end="url(#arrow-green)"/>
  <!-- 3 -> 4 -->
  <path d="M760,170 L800,170 Q810,170 810,170" fill="none" stroke="#7FBA00" stroke-width="2" marker-end="url(#arrow-green)"/>
  <!-- 4 -> 5 -->
  <path d="M1010,170 L1050,170 Q1060,170 1060,170" fill="none" stroke="#7FBA00" stroke-width="2" marker-end="url(#arrow-yellow)"/>

  <!-- ============================================================ -->
  <!-- ROW 2: Phases 6-10   y-center = 380 -->
  <!-- ============================================================ -->

  <!-- Phase 6: Tasks (Yellow) -->
  <g filter="url(#shadow)">
    <rect x="1060" y="320" width="200" height="100" rx="8" fill="#FFFFFF" stroke="#FFB900" stroke-width="2"/>
    <rect x="1060" y="320" width="200" height="6" rx="3" fill="#FFB900"/>
  </g>
  <text x="1076" y="348" font-size="11" fill="#888780">Phase 6</text>
  <text x="1160" y="372" text-anchor="middle" font-size="16" font-weight="700" fill="#2C2C2A">Tasks</text>
  <text x="1160" y="392" text-anchor="middle" font-size="11" fill="#5F5E5A">TASKS.md</text>

  <!-- Phase 7: Analyze (Red) -->
  <g filter="url(#shadow)">
    <rect x="810" y="320" width="200" height="100" rx="8" fill="#FFFFFF" stroke="#F25022" stroke-width="2"/>
    <rect x="810" y="320" width="200" height="6" rx="3" fill="#F25022"/>
  </g>
  <text x="826" y="348" font-size="11" fill="#888780">Phase 7</text>
  <text x="910" y="372" text-anchor="middle" font-size="16" font-weight="700" fill="#2C2C2A">Analyze</text>
  <text x="910" y="392" text-anchor="middle" font-size="11" fill="#5F5E5A">Quality Gate</text>

  <!-- Phase 8: Implement (Blue) -->
  <g filter="url(#shadow)">
    <rect x="560" y="320" width="200" height="100" rx="8" fill="#FFFFFF" stroke="#0078D4" stroke-width="2"/>
    <rect x="560" y="320" width="200" height="6" rx="3" fill="#0078D4"/>
  </g>
  <text x="576" y="348" font-size="11" fill="#888780">Phase 8</text>
  <text x="660" y="372" text-anchor="middle" font-size="16" font-weight="700" fill="#2C2C2A">Implement</text>
  <text x="660" y="392" text-anchor="middle" font-size="11" fill="#5F5E5A">CHECKLIST.md</text>

  <!-- Phase 9: Verify (Green) -->
  <g filter="url(#shadow)">
    <rect x="310" y="320" width="200" height="100" rx="8" fill="#FFFFFF" stroke="#7FBA00" stroke-width="2"/>
    <rect x="310" y="320" width="200" height="6" rx="3" fill="#7FBA00"/>
  </g>
  <text x="326" y="348" font-size="11" fill="#888780">Phase 9</text>
  <text x="410" y="372" text-anchor="middle" font-size="16" font-weight="700" fill="#2C2C2A">Verify</text>
  <text x="410" y="392" text-anchor="middle" font-size="11" fill="#5F5E5A">VERIFICATION.md</text>

  <!-- Phase 10: Release (Green) -->
  <g filter="url(#shadow)">
    <rect x="60" y="320" width="200" height="100" rx="8" fill="#FFFFFF" stroke="#7FBA00" stroke-width="2"/>
    <rect x="60" y="320" width="200" height="6" rx="3" fill="#7FBA00"/>
  </g>
  <text x="76" y="348" font-size="11" fill="#888780">Phase 10</text>
  <text x="160" y="372" text-anchor="middle" font-size="16" font-weight="700" fill="#2C2C2A">Release</text>
  <text x="160" y="392" text-anchor="middle" font-size="11" fill="#5F5E5A">PR + Docs</text>

  <!-- ============================================================ -->
  <!-- VERTICAL ARROW: Phase 5 -> Phase 6 (Q-curve corner) -->
  <!-- ============================================================ -->
  <path d="M1160,220 L1160,310" fill="none" stroke="#FFB900" stroke-width="2" marker-end="url(#arrow-yellow)"/>

  <!-- ============================================================ -->
  <!-- ROW 2 ARROWS (right to left) -->
  <!-- ============================================================ -->

  <!-- 6 -> 7 -->
  <path d="M1060,370 L1020,370 Q1010,370 1010,370" fill="none" stroke="#FFB900" stroke-width="2" marker-end="url(#arrow-red)"/>
  <!-- 7 -> 8 -->
  <path d="M810,370 L770,370 Q760,370 760,370" fill="none" stroke="#F25022" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <!-- 8 -> 9 -->
  <path d="M560,370 L520,370 Q510,370 510,370" fill="none" stroke="#0078D4" stroke-width="2" marker-end="url(#arrow-green)"/>
  <!-- 9 -> 10 -->
  <path d="M310,370 L270,370 Q260,370 260,370" fill="none" stroke="#7FBA00" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- ============================================================ -->
  <!-- MANDATORY BADGE (right side) -->
  <!-- ============================================================ -->
  <g transform="translate(1320, 255)">
    <rect x="0" y="0" width="60" height="28" rx="14" fill="#2C2C2A"/>
    <!-- Lock icon -->
    <g transform="translate(10, 6)">
      <rect x="2" y="7" width="12" height="10" rx="2" fill="#FFFFFF"/>
      <path d="M5,7 V4 a3,3 0 0 1 6,0 V7" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="8" cy="12.5" r="1.5" fill="#2C2C2A"/>
    </g>
    <text x="28" y="19" font-size="9" font-weight="600" fill="#FFFFFF">ALL</text>
  </g>
  <text x="1350" y="300" text-anchor="middle" font-size="10" font-weight="600" fill="#5F5E5A">Mandatory</text>

  <!-- ============================================================ -->
  <!-- LEGEND -->
  <!-- ============================================================ -->
  <g transform="translate(280, 470)">
    <!-- Blue -->
    <rect x="0" y="0" width="14" height="14" rx="3" fill="#0078D4"/>
    <text x="20" y="12" font-size="12" fill="#5F5E5A">Foundation</text>

    <!-- Green -->
    <rect x="140" y="0" width="14" height="14" rx="3" fill="#7FBA00"/>
    <text x="160" y="12" font-size="12" fill="#5F5E5A">Specification</text>

    <!-- Yellow -->
    <rect x="300" y="0" width="14" height="14" rx="3" fill="#FFB900"/>
    <text x="320" y="12" font-size="12" fill="#5F5E5A">Architecture</text>

    <!-- Red -->
    <rect x="460" y="0" width="14" height="14" rx="3" fill="#F25022"/>
    <text x="480" y="12" font-size="12" fill="#5F5E5A">Quality Gate</text>
  </g>

  <!-- Flow direction labels -->
  <g transform="translate(700, 510)">
    <text x="0" y="0" text-anchor="middle" font-size="10" fill="#B4B2A9">Row 1: left to right  ·  Row 2: right to left  ·  Sequential enforcement</text>
  </g>

  <!-- ============================================================ -->
  <!-- DECORATIVE: phase flow numbers in circles -->
  <!-- ============================================================ -->

  <!-- Row 1 connectors: small circles on arrows -->
  <circle cx="280" cy="170" r="4" fill="#0078D4" opacity="0.3"/>
  <circle cx="530" cy="170" r="4" fill="#7FBA00" opacity="0.3"/>
  <circle cx="780" cy="170" r="4" fill="#7FBA00" opacity="0.3"/>
  <circle cx="1030" cy="170" r="4" fill="#FFB900" opacity="0.3"/>

  <!-- Vertical connector dot -->
  <circle cx="1160" cy="270" r="4" fill="#FFB900" opacity="0.3"/>

  <!-- Row 2 connectors -->
  <circle cx="1040" cy="370" r="4" fill="#F25022" opacity="0.3"/>
  <circle cx="790" cy="370" r="4" fill="#0078D4" opacity="0.3"/>
  <circle cx="540" cy="370" r="4" fill="#7FBA00" opacity="0.3"/>
  <circle cx="290" cy="370" r="4" fill="#7FBA00" opacity="0.3"/>

</svg>