<!-- Specky v3.0 — Icon (AI Pipeline Concept)
     Three connected nodes forming an abstract "S" path = pipeline phases
     Nodes pulse with energy = agentic AI
     Central node larger = the spec (brain/orchestrator)
     Connections = MCP-to-MCP routing
     80×80 square for GitHub avatar, npm, favicons
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="glowLine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <!-- Energy pulse glow -->
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="80" height="80" rx="16" fill="url(#bg)"/>

  <!-- Connection paths (pipeline flow) — S-curve through 3 nodes -->
  <!-- Top-right to center -->
  <path d="M54,22 C54,34 40,30 40,40" stroke="#c4b5fd" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- Center to bottom-left -->
  <path d="M40,40 C40,50 26,46 26,58" stroke="#c4b5fd" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Secondary connections (MCP-to-MCP routing) -->
  <path d="M54,22 C62,28 62,34 56,40" stroke="#a78bfa" stroke-width="1.2" fill="none" opacity="0.3" stroke-dasharray="3 2"/>
  <path d="M26,58 C18,52 18,46 24,40" stroke="#a78bfa" stroke-width="1.2" fill="none" opacity="0.3" stroke-dasharray="3 2"/>
  <!-- Cross connection (orchestration) -->
  <path d="M56,40 L44,40" stroke="#a78bfa" stroke-width="1" fill="none" opacity="0.25" stroke-dasharray="2 2"/>
  <path d="M24,40 L36,40" stroke="#a78bfa" stroke-width="1" fill="none" opacity="0.25" stroke-dasharray="2 2"/>

  <!-- Node 1: Input/Discover (top-right) — small -->
  <circle cx="54" cy="22" r="5" fill="none" stroke="#c4b5fd" stroke-width="1.5" opacity="0.4"/>
  <circle cx="54" cy="22" r="3" fill="#e9d5ff" filter="url(#nodeGlow)"/>

  <!-- Node 2: SPEC — Central orchestrator (largest, glowing) -->
  <circle cx="40" cy="40" r="10" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>
  <circle cx="40" cy="40" r="7" fill="white" opacity="0.15"/>
  <circle cx="40" cy="40" r="5" fill="white" filter="url(#nodeGlow)"/>
  <!-- Inner "S" letterform hint -->
  <path d="M37,36 C37,36 43,36 43,40 C43,44 37,44 37,44" stroke="#7c3aed" stroke-width="1.8" stroke-linecap="round" fill="none"/>

  <!-- Node 3: Output/Deploy (bottom-left) — small -->
  <circle cx="26" cy="58" r="5" fill="none" stroke="#c4b5fd" stroke-width="1.5" opacity="0.4"/>
  <circle cx="26" cy="58" r="3" fill="#e9d5ff" filter="url(#nodeGlow)"/>

  <!-- Satellite micro-nodes (representing MCP tools / 53 tools ecosystem) -->
  <circle cx="56" cy="40" r="2" fill="#c4b5fd" opacity="0.5"/>
  <circle cx="24" cy="40" r="2" fill="#c4b5fd" opacity="0.5"/>
  <circle cx="40" cy="22" r="1.5" fill="#a78bfa" opacity="0.35"/>
  <circle cx="40" cy="58" r="1.5" fill="#a78bfa" opacity="0.35"/>
  <circle cx="62" cy="32" r="1.2" fill="#c4b5fd" opacity="0.3"/>
  <circle cx="18" cy="48" r="1.2" fill="#c4b5fd" opacity="0.3"/>

  <!-- Energy pulses on main path -->
  <circle cx="47" cy="30" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="33" cy="50" r="1.5" fill="white" opacity="0.7"/>

</svg>
