<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trigger Eval Review</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 24px; background: #0d1117; color: #e6edf3; }
  header { max-width: 980px; margin: 0 auto 20px; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .meta { color: #8b949e; font-size: 13px; }
  .meta code { color: #79c0ff; }
  main { max-width: 980px; margin: 0 auto; }
  .toolbar { display: flex; gap: 8px; margin: 16px 0; flex-wrap: wrap; }
  button { font: inherit; padding: 8px 14px; border-radius: 6px; border: 1px solid #30363d; background: #21262d; color: #e6edf3; cursor: pointer; }
  button.primary { background: #238636; border-color: #2ea043; }
  button.primary:hover { background: #2ea043; }
  button:hover { background: #30363d; }
  .item { border: 1px solid #30363d; border-radius: 8px; padding: 12px; margin-bottom: 10px; background: #161b22; }
  .item.trigger { border-left: 4px solid #2ea043; }
  .item.notrigger { border-left: 4px solid #f85149; }
  .row { display: flex; gap: 10px; align-items: flex-start; }
  textarea { flex: 1; min-height: 56px; resize: vertical; font: inherit; padding: 8px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: #e6edf3; }
  .controls { display: flex; flex-direction: column; gap: 6px; min-width: 150px; }
  label.toggle { font-size: 13px; display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .remove { color: #f85149; border-color: #f85149; }
  .count { color: #8b949e; font-size: 13px; margin-left: auto; align-self: center; }
</style>
</head>
<body>
<header>
  <h1>Trigger Eval Review · <span id="skillName"></span></h1>
  <div class="meta">Current description: <code id="skillDesc"></code></div>
</header>
<main>
  <div class="toolbar">
    <button id="addTrigger">+ Add should-trigger</button>
    <button id="addNoTrigger">+ Add should-not-trigger</button>
    <button class="primary" id="export">Export Eval Set</button>
    <span class="count" id="count"></span>
  </div>
  <div id="list"></div>
</main>
<script>
  // Injected by generate_review / skill-creator. Keep as a bare assignment (no quotes).
  const SKILL_NAME = "__SKILL_NAME_PLACEHOLDER__";
  const SKILL_DESCRIPTION = "__SKILL_DESCRIPTION_PLACEHOLDER__";
  let EVAL_DATA = __EVAL_DATA_PLACEHOLDER__;

  document.getElementById("skillName").textContent = SKILL_NAME;
  document.getElementById("skillDesc").textContent = SKILL_DESCRIPTION;

  const list = document.getElementById("list");

  function render() {
    list.innerHTML = "";
    EVAL_DATA.forEach((item, i) => {
      const div = document.createElement("div");
      div.className = "item " + (item.should_trigger ? "trigger" : "notrigger");
      const row = document.createElement("div");
      row.className = "row";

      const ta = document.createElement("textarea");
      ta.value = item.query || "";
      ta.addEventListener("input", () => { EVAL_DATA[i].query = ta.value; });

      const controls = document.createElement("div");
      controls.className = "controls";

      const lbl = document.createElement("label");
      lbl.className = "toggle";
      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = !!item.should_trigger;
      cb.addEventListener("change", () => { EVAL_DATA[i].should_trigger = cb.checked; render(); });
      lbl.appendChild(cb);
      lbl.appendChild(document.createTextNode(" should trigger"));

      const rm = document.createElement("button");
      rm.className = "remove";
      rm.textContent = "Remove";
      rm.addEventListener("click", () => { EVAL_DATA.splice(i, 1); render(); });

      controls.appendChild(lbl);
      controls.appendChild(rm);
      row.appendChild(ta);
      row.appendChild(controls);
      div.appendChild(row);
      list.appendChild(div);
    });
    const t = EVAL_DATA.filter(e => e.should_trigger).length;
    document.getElementById("count").textContent =
      EVAL_DATA.length + " queries (" + t + " trigger, " + (EVAL_DATA.length - t) + " no-trigger)";
  }

  function add(shouldTrigger) {
    EVAL_DATA.push({ query: "", should_trigger: shouldTrigger });
    render();
  }

  document.getElementById("addTrigger").addEventListener("click", () => add(true));
  document.getElementById("addNoTrigger").addEventListener("click", () => add(false));
  document.getElementById("export").addEventListener("click", () => {
    const clean = EVAL_DATA
      .filter(e => (e.query || "").trim().length > 0)
      .map(e => ({ query: e.query.trim(), should_trigger: !!e.should_trigger }));
    const blob = new Blob([JSON.stringify(clean, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "eval_set.json";
    a.click();
    URL.revokeObjectURL(a.href);
  });

  if (!Array.isArray(EVAL_DATA)) EVAL_DATA = [];
  render();
</script>
</body>
</html>
