name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - run: npm run build

      - name: Audit agent frontmatter portability
        run: node scripts/audit-agent-frontmatter.mjs

      - name: API reference is in sync with the tool registry
        run: node scripts/generate-api-reference.mjs --check

      - name: Run tests with coverage thresholds
        run: npm run test:coverage

      - name: "Check for : any usage in src/"
        run: |
          if grep -r ": any" src/; then
            echo "::error::Found : any in src/ -- please use explicit types"
            exit 1
          fi

      - name: MCP initialize handshake test
        run: |
          export WORKSPACE=$(mktemp -d)
          git -C "$WORKSPACE" init -q
          (
            cd "$WORKSPACE"
            node "$GITHUB_WORKSPACE/dist/cli/index.js" init --target=agent-skills
          )
          node --input-type=module <<'NODE'
          import { Client } from "@modelcontextprotocol/sdk/client/index.js";
          import { StdioClientTransport } from "@modelcontextprotocol/sdk/client/stdio.js";
          import { join } from "node:path";

          const client = new Client({ name: "ci-handshake", version: "1.0.0" }, { capabilities: {} });
          const transport = new StdioClientTransport({
            command: "node",
            args: [join(process.env.GITHUB_WORKSPACE, "dist/index.js")],
            cwd: process.env.WORKSPACE,
          });
          await client.connect(transport);
          const tools = await client.listTools();
          if (!tools.tools.some((tool) => tool.name === "sdd_init")) {
            throw new Error("MCP handshake succeeded but sdd_init was not exposed.");
          }
          await client.close();
          console.log(`MCP handshake OK — ${tools.tools.length} tools exposed.`);
          NODE
