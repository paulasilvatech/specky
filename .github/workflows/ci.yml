name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - run: npm run build

      - name: Run unit tests
        run: npm test

      - name: 'Check for : any usage in src/'
        run: |
          if grep -r ": any" src/; then
            echo "::error::Found : any in src/ -- please use explicit types"
            exit 1
          fi

      - name: MCP initialize handshake test
        run: |
          RESPONSE=$(echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"0.1.0"}}}' | node dist/index.js 2>/dev/null || true)
          if echo "$RESPONSE" | grep -qi "specky"; then
            echo "MCP handshake OK — response contains 'specky'"
          else
            echo "::error::MCP handshake failed — response does not contain 'specky'"
            echo "Response was: $RESPONSE"
            exit 1
          fi

      - name: Generate SBOM
        uses: anchore/sbom-action@e11c554e6e2de32368a3fae542631b624c75d3d8 # v0
        with:
          format: cyclonedx-json
          output-file: sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6db9a6b7c67862cd61e8fa7bcf015 # v4
        with:
          name: sbom
          path: sbom.json

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build Docker image
        run: docker build -t specky .
