name: Install Smoke Test

on:
  push:
    branches: [main, develop]
  pull_request:
    paths:
      - 'src/cli/**'
      - 'scripts/**'
      - 'package.json'
      - '.apm/**'
      - '.github/workflows/install-smoke.yml'

permissions:
  contents: read

jobs:
  install-smoke:
    name: ${{ matrix.os }} / node ${{ matrix.node }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Pack tarball
        shell: bash
        run: npm pack

      - name: Install into fresh workspace + run specky init
        shell: bash
        run: |
          set -e
          TARBALL=$(ls specky-sdd-*.tgz)
          mkdir fresh
          cd fresh
          git init -q
          npm init -y >/dev/null
          npm install "../$TARBALL" --silent
          npx specky init --ide=both

      - name: Assert asset layout
        shell: bash
        run: |
          set -e
          cd fresh
          fail=0
          count() { find "$1" -maxdepth 1 -type f 2>/dev/null | wc -l | tr -d ' '; }
          countd() { find "$1" -mindepth 1 -maxdepth 1 -type d 2>/dev/null | wc -l | tr -d ' '; }
          assert_eq() { actual="$1"; expected="$2"; label="$3"; if [ "$actual" != "$expected" ]; then echo "::error::$label: expected $expected, got $actual"; fail=1; fi; }
          assert_eq "$(count .claude/agents)"        13 "claude agents"
          assert_eq "$(count .claude/commands)"      22 "claude commands"
          assert_eq "$(countd .claude/skills)"       8  "claude skills"
          assert_eq "$(count .claude/hooks/scripts)" 16 "claude hooks"
          assert_eq "$(count .github/agents)"        13 "copilot agents"
          assert_eq "$(count .github/prompts)"       22 "copilot prompts"
          assert_eq "$(count .github/hooks/specky/scripts)" 16 "copilot hooks"
          test -f .claude/settings.json || { echo "::error::missing .claude/settings.json"; fail=1; }
          test -f .mcp.json || { echo "::error::missing .mcp.json"; fail=1; }
          test -f .vscode/mcp.json || { echo "::error::missing .vscode/mcp.json"; fail=1; }
          test -f .specky/install.lock || { echo "::error::missing .specky/install.lock"; fail=1; }
          exit $fail

      - name: specky doctor (must exit 0)
        shell: bash
        run: cd fresh && npx specky doctor

      - name: specky status
        shell: bash
        run: cd fresh && npx specky status

      - name: Assert Claude hooks use mcp__specky__ prefix
        shell: bash
        run: |
          cd fresh
          if ! grep -q 'mcp__specky__sdd_init' .claude/settings.json; then
            echo "::error::settings.json missing mcp__specky__ prefix"
            exit 1
          fi
