name: Publish

on:
  release:
    types: [published]
  # Manual trigger — e.g. to (re)build & push the GHCR container when npm was
  # already published, without cutting a new release. npm-publish is skipped on
  # this event (see its `if`); docker-publish still runs when PUBLISH_DOCKER=true.
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    # Only publish npm on an actual GitHub Release. On workflow_dispatch this
    # job is skipped (npm is already out) and only docker-publish runs.
    if: ${{ github.event_name == 'release' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - run: npm run build

      - name: Run tests with coverage thresholds
        run: npm run test:coverage

      - name: Verify npm package contents
        run: npm pack --dry-run

      - name: CLI smoke test
        run: |
          node dist/cli/index.js --version
          node dist/cli/index.js --help >/dev/null

      - name: Publish to npm (skip if this version is already published)
        run: |
          VERSION=$(jq -r '.version' package.json)
          if npm view "specky-sdd@$VERSION" version >/dev/null 2>&1; then
            echo "specky-sdd@$VERSION is already on npm — skipping publish (idempotent)."
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  docker-publish:
    runs-on: ubuntu-latest
    needs: [npm-publish]
    # Opt-in GHCR publish. Enable by setting the repo variable PUBLISH_DOCKER=true.
    # Runs on a Release (after npm-publish) OR on a manual workflow_dispatch
    # (npm-publish skipped). `always()` lets it run even when npm-publish is
    # skipped, provided npm-publish did not FAIL.
    if: >-
      ${{ always()
      && vars.PUBLISH_DOCKER == 'true'
      && needs.npm-publish.result != 'failure'
      && needs.npm-publish.result != 'cancelled' }}
    # Only sign when cosign secrets are configured, so a release without them
    # still succeeds (build + push run regardless).
    env:
      HAS_COSIGN: ${{ secrets.COSIGN_PRIVATE_KEY != '' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Get version from package.json
        id: pkg
        run: echo "version=$(jq -r '.version' package.json)" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          # Default: the Actions GITHUB_TOKEN. If GHCR rejects it with
          # `permission_denied: write_package` (org policy / package not yet
          # linked to the repo), create a PAT with `write:packages` and add it
          # as the GHCR_TOKEN secret (+ optional GHCR_USER variable) — it takes
          # precedence automatically.
          username: ${{ vars.GHCR_USER || github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/paulasilvatech/specky:latest \
            -t ghcr.io/paulasilvatech/specky:${{ steps.pkg.outputs.version }} \
            .

      - name: Push Docker image
        run: |
          docker push ghcr.io/paulasilvatech/specky:latest
          docker push ghcr.io/paulasilvatech/specky:${{ steps.pkg.outputs.version }}

      # T-082: Sign Docker image with cosign (requires COSIGN_PRIVATE_KEY + COSIGN_PASSWORD secrets)
      - name: Install cosign
        if: env.HAS_COSIGN == 'true'
        uses: sigstore/cosign-installer@c56c2d3e59e4281cc41dea2217323ba5694b171e # v3.8.0

      - name: Sign Docker image
        if: env.HAS_COSIGN == 'true'
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          IMAGE_VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY \
            ghcr.io/paulasilvatech/specky:latest
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY \
            "ghcr.io/paulasilvatech/specky:${IMAGE_VERSION}"

      # T-083: Generate SBOM in CycloneDX format and attach as release artifact
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/paulasilvatech/specky:${{ steps.pkg.outputs.version }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          upload-artifact: true
          artifact-name: sbom-${{ steps.pkg.outputs.version }}
