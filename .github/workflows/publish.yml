name: Publish

on:
  push:
    tags: ['v*']
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  docker-publish:
    runs-on: ubuntu-latest
    needs: npm-publish
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Get version from package.json
        id: pkg
        run: echo "version=$(jq -r '.version' package.json)" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/paulasilvatech/specky:latest \
            -t ghcr.io/paulasilvatech/specky:${{ steps.pkg.outputs.version }} \
            .

      - name: Push Docker image
        run: |
          docker push ghcr.io/paulasilvatech/specky:latest
          docker push ghcr.io/paulasilvatech/specky:${{ steps.pkg.outputs.version }}

      # T-082: Sign Docker image with cosign (requires COSIGN_PRIVATE_KEY + COSIGN_PASSWORD secrets)
      - name: Install cosign
        uses: sigstore/cosign-installer@c56c2d3e59e4281cc41dea2217323ba5694b171e # v3.8.0

      - name: Sign Docker image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          IMAGE_VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY \
            ghcr.io/paulasilvatech/specky:latest
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY \
            "ghcr.io/paulasilvatech/specky:${IMAGE_VERSION}"

      # T-083: Generate SBOM in CycloneDX format and attach as release artifact
      - name: Generate SBOM
        uses: anchore/sbom-action@f6c3d0fe42c3cf876e3462574e4c9416b5e0f07a # v0
        with:
          image: ghcr.io/paulasilvatech/specky:${{ steps.pkg.outputs.version }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          upload-artifact: true
          artifact-name: sbom-${{ steps.pkg.outputs.version }}
